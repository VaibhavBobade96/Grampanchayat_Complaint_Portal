{% extends "base.html" %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-lg border-0" style="width: 100%; max-width: 450px; border-radius: 15px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <i class="fas fa-lock-open fa-3x text-primary mb-3"></i>
                <h2 class="fw-bold">{{ lang['forgot_pw'] }}</h2>
                <p class="text-muted small">Enter your email address to receive a reset link.</p>
            </div>
            
            <form method="POST">
                <div class="mb-4">
                    <label class="form-label fw-semibold">{{ lang['label_email'] }}</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                        <input type="email" name="email" class="form-control border-start-0 bg-light" placeholder="example@mail.com" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm" style="border-radius: 8px;">
                    {{ lang['btn_submit'] }}
                </button>
            </form>
            
            <div class="text-center mt-4">
                <a href="{{ url_for('login') }}" class="text-decoration-none small fw-bold text-secondary">
                    <i class="fas fa-arrow-left me-1"></i> Back to Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
